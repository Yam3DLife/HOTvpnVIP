name: Generate User Subscriptions

on:
  push:
    branches: [ main, master ]
    paths:
      - 'users.json'
      - 'generate.py'
      - 'configs/**'
      - 'keys/**'
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Create directories
        run: |
          mkdir -p configs keys subs
      
      - name: List files before generation
        run: |
          echo "=== Проверяем configs ==="
          ls -la configs/ || echo "configs не существует или пуста"
          echo "=== Проверяем keys ==="
          ls -la keys/ || echo "keys не существует или пуста"
      
      - name: Run generation script
        run: python generate.py
      
      - name: List files after generation
        run: |
          echo "=== Файлы в subs после генерации ==="
          ls -la subs/ || echo "subs не существует или пуста"
      
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Добавляем ВСЕ файлы в subs (и .txt, и .json, и любые другие)
          git add subs/ || true
          
          # Добавляем users.json (если изменился)
          git add users.json || true
          
          # Проверяем, есть ли изменения
          if git diff --cached --quiet; then
            echo "Нет изменений для коммита"
            exit 0
          fi
          
          # Коммитим
          git commit -m "Auto-update subscriptions [skip ci]"
          
          # Пытаемся запушить
          git push origin main || git push origin main --force
